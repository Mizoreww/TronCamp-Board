<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TronCamp VLA LeaderBoard</title>
<link rel="stylesheet" href="./style.css">
<script src="./config.js"></script>
<script src="./board.js"></script>
</head>
<body data-board="dev">
<header>
  <h1>TronCamp <span class="accent">VLA</span> LeaderBoard</h1>
  <div class="meta">
    <span id="updated">加载中…</span>
    <a href="./final.html">FINAL</a>
  </div>
</header>
<main>
  <table id="board" hidden>
    <thead>
      <tr class="grp">
        <th rowspan="2">#</th>
        <th rowspan="2">队伍</th>
        <th rowspan="2">总分</th>
        <th class="tgroup" colspan="1">T1</th>
        <th class="tgroup" colspan="4">T2</th>
        <th class="tgroup" colspan="2">T3</th>
      </tr>
      <tr class="sub">
        <th>干净分</th>
        <th>综合</th><th>擦除率</th><th>力质量</th><th>Δ₁</th>
        <th>综合</th><th>Δ₂</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <p id="empty" hidden>暂无成绩</p>
</main>
</body>
</html>
