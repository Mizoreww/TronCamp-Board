<svg viewBox="0 0 960 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TronCamp 前端后端系统与提交评测流程" font-family="'PingFang SC','Microsoft YaHei',system-ui,sans-serif" style="width:100%;height:auto;background:#0b0e14;border-radius:8px">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#38e1d4"/></marker>
    <marker id="ahd" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto"><path d="M0,0 L7.5,3 L0,6 Z" fill="#5d6878"/></marker>
    <style>
      .t{fill:#dfe7f1;font-size:13px;font-weight:600}
      .s{fill:#8a98ac;font-size:10px;font-family:ui-monospace,'JetBrains Mono',Consolas,monospace}
      .c{fill:#5d6878;font-size:9.5px;font-family:ui-monospace,'JetBrains Mono',Consolas,monospace}
      .band{fill:#38e1d4;font-size:10.5px;font-family:ui-monospace,'JetBrains Mono',Consolas,monospace;letter-spacing:.04em}
      .node{fill:#131822;stroke:#283243;stroke-width:1.2}
      .key{fill:#10141c;stroke:#1d7d77;stroke-width:1.3}
      .ln{stroke:#38e1d4;stroke-width:1.6;fill:none}
    </style>
  </defs>

  <!-- feedback loop frame (back of the page): 榜单 → 左缘 → 选手左侧入,避开顶部段标 -->
  <path d="M824,383 H928 V20 H8 V72 H20" fill="none" stroke="#5d6878" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ahd)"/>
  <text x="510" y="14" text-anchor="middle" class="c" fill="#8a98ac">看榜 · 据反馈改进 · 重新提交(T1 → T2 → T3 顺序解锁,过即锁定)</text>

  <!-- ① 提交 band -->
  <text x="24" y="38" class="band">① 提交 · scripts/submit.py 唯一通道</text>
  <g>
    <rect class="node" x="24" y="44" width="150" height="56" rx="7"/>
    <text x="99" y="68" text-anchor="middle" class="t">选手</text>
    <text x="99" y="86" text-anchor="middle" class="s">代码库 + 权重</text>

    <rect class="key" x="270" y="44" width="150" height="56" rx="7"/>
    <text x="345" y="66" text-anchor="middle" class="s" fill="#38e1d4" font-size="11">scripts/submit.py</text>
    <text x="345" y="83" text-anchor="middle" class="s">--track · --code-dir</text>

    <rect class="key" x="516" y="44" width="150" height="56" rx="7"/>
    <text x="591" y="66" text-anchor="middle" class="t" font-size="12.5">后端 API :8080</text>
    <text x="591" y="84" text-anchor="middle" class="s">/api/upload · /api/submit</text>

    <rect class="node" x="762" y="44" width="150" height="56" rx="7"/>
    <text x="837" y="68" text-anchor="middle" class="t">队列</text>
    <text x="837" y="86" text-anchor="middle" class="s">SQLite · queued</text>
  </g>
  <line class="ln" x1="174" y1="72" x2="264" y2="72" marker-end="url(#ah)"/>
  <line class="ln" x1="420" y1="72" x2="510" y2="72" marker-end="url(#ah)"/>
  <line class="ln" x1="666" y1="72" x2="756" y2="72" marker-end="url(#ah)"/>
  <text x="591" y="120" text-anchor="middle" class="c">闸门:未过前置题 403 · T1/T2 过即锁 409 · 超日限 429</text>

  <!-- 队列 → worker -->
  <path d="M837,100 V150 H480 V170" class="ln" marker-end="url(#ah)"/>

  <!-- ② 评测 band -->
  <text x="24" y="166" class="band">② 评测 · ZMQ 进程隔离 + 沙箱(GPU)</text>
  <rect x="120" y="176" width="720" height="124" rx="9" fill="#0e1219" stroke="#1d2530" stroke-width="1.2"/>
  <text x="136" y="197" class="s" fill="#38e1d4" font-size="11">评测 worker · evald</text>
  <g>
    <rect class="node" x="136" y="212" width="156" height="50" rx="6"/>
    <text x="214" y="232" text-anchor="middle" class="t" font-size="12">下载 ckpt</text>
    <text x="214" y="249" text-anchor="middle" class="s">SHA256 校验</text>

    <rect class="node" x="312" y="212" width="176" height="50" rx="6"/>
    <text x="400" y="232" text-anchor="middle" class="t" font-size="12">policy server</text>
    <text x="400" y="249" text-anchor="middle" class="s">ZMQ · π0.5</text>

    <rect class="node" x="508" y="212" width="152" height="50" rx="6"/>
    <text x="584" y="232" text-anchor="middle" class="t" font-size="12">mujoco rollout</text>
    <text x="584" y="249" text-anchor="middle" class="s">±3cm · 50/100 集</text>

    <rect class="node" x="680" y="212" width="148" height="50" rx="6"/>
    <text x="754" y="232" text-anchor="middle" class="t" font-size="12">score_force</text>
    <text x="754" y="249" text-anchor="middle" class="s">擦除率 + 力质量</text>
  </g>
  <line class="ln" x1="292" y1="237" x2="306" y2="237" marker-end="url(#ah)"/>
  <line class="ln" x1="488" y1="237" x2="502" y2="237" marker-end="url(#ah)"/>
  <line class="ln" x1="660" y1="237" x2="674" y2="237" marker-end="url(#ah)"/>
  <text x="400" y="285" text-anchor="middle" class="c">T1:官方 noforce config(只载选手权重)　·　T2/T3:解压选手代码包 + 沙箱起服务</text>

  <!-- worker → 上榜 -->
  <path d="M225,300 V330 H225 V340" class="ln" marker-end="url(#ah)"/>

  <!-- ③ 上榜 band -->
  <text x="24" y="346" class="band">③ 上榜 · GitHub Pages</text>
  <g>
    <rect class="node" x="150" y="356" width="150" height="54" rx="7"/>
    <text x="225" y="379" text-anchor="middle" class="t">scores DB</text>
    <text x="225" y="396" text-anchor="middle" class="s">按题取最佳</text>

    <rect class="node" x="372" y="356" width="190" height="54" rx="7"/>
    <text x="467" y="379" text-anchor="middle" class="t">board JSON</text>
    <text x="467" y="396" text-anchor="middle" class="s">boardpub · 按题导榜</text>

    <rect class="key" x="614" y="356" width="210" height="54" rx="7"/>
    <text x="719" y="379" text-anchor="middle" class="t" fill="#38e1d4">GitHub Pages 榜单</text>
    <text x="719" y="396" text-anchor="middle" class="s">官网 · 实时刷新</text>
  </g>
  <line class="ln" x1="300" y1="383" x2="366" y2="383" marker-end="url(#ah)"/>
  <line class="ln" x1="562" y1="383" x2="608" y2="383" marker-end="url(#ah)"/>

  <!-- T1→T2→T3 顺序解锁 strip -->
  <line x1="24" y1="432" x2="936" y2="432" stroke="#161c25" stroke-width="1"/>
  <g>
    <rect x="24" y="448" width="258" height="48" rx="7" fill="#131822" stroke="#283243" stroke-width="1.2"/>
    <text x="153" y="470" text-anchor="middle" class="t" font-size="12.5">T1 · 仅视觉版本</text>
    <text x="153" y="487" text-anchor="middle" class="s">给定无力数据集 + 官方 config · SR ≥ 0.25</text>

    <rect x="351" y="448" width="258" height="48" rx="7" fill="#131822" stroke="#283243" stroke-width="1.2"/>
    <text x="480" y="470" text-anchor="middle" class="t" font-size="12.5">T2 · 加入力信号</text>
    <text x="480" y="487" text-anchor="middle" class="s">开放 · 交代码包 + 权重 · SR ≥ 0.55</text>

    <rect x="678" y="448" width="258" height="48" rx="7" fill="#10141c" stroke="#1d7d77" stroke-width="1.3"/>
    <text x="807" y="470" text-anchor="middle" class="t" font-size="12.5" fill="#38e1d4">T3 · 改进竞技场 · 主榜</text>
    <text x="807" y="487" text-anchor="middle" class="s">0.7·擦除 + 0.3·力质量 · 排名</text>
  </g>
  <line class="ln" x1="282" y1="472" x2="345" y2="472" marker-end="url(#ah)"/>
  <line class="ln" x1="609" y1="472" x2="672" y2="472" marker-end="url(#ah)"/>
  <text x="313" y="464" text-anchor="middle" class="c">过→解锁</text>
  <text x="640" y="464" text-anchor="middle" class="c">过→解锁</text>
</svg>
